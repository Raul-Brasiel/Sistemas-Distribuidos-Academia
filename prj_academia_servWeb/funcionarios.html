<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Funcionários - Academia</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="JS/script_funcionarios.js"></script>
    <script> function montarMenu() { $("#div_Menu").load("nav_bar.html"); } </script>
</head>
<body onload="montarMenu(); carregarFuncionarios();">
<div id="div_Menu"></div>
<div class="container mt-4">
    <h4>👔 Gerenciar Funcionários</h4><hr>
    <div id="msg"></div>
    <div class="card mb-4">
        <div class="card-header" id="form-titulo">Novo Funcionário</div>
        <div class="card-body">
            <input type="hidden" id="func-id">
            <div class="row mb-2">
                <div class="col-md-5">
                    <label class="form-label">Nome *</label>
                    <input type="text" id="nome" class="form-control" placeholder="Nome completo">
                </div>
                <div class="col-md-3">
                    <label class="form-label">CPF *</label>
                    <input type="text" id="cpf" class="form-control" placeholder="Somente números">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Cargo *</label>
                    <input type="text" id="cargo" class="form-control" placeholder="Ex: Instrutor de Musculação">
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-5">
                    <label class="form-label">E-mail *</label>
                    <input type="email" id="email" class="form-control" placeholder="email@exemplo.com">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" id="telefone" class="form-control" placeholder="(34) 99999-0000">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Salário (R$)</label>
                    <input type="number" id="salario" class="form-control" step="0.01" placeholder="2500.00">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Ativo</label>
                    <select id="ativo" class="form-select">
                        <option value="true">Sim</option>
                        <option value="false">Não</option>
                    </select>
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-3">
                    <label class="form-label">Data de Admissão</label>
                    <input type="date" id="dataAdmissao" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data de Demissão</label>
                    <input type="date" id="dataDemissao" class="form-control">
                </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="salvarFuncionario()">💾 Salvar</button>
            <button class="btn btn-secondary btn-sm" onclick="limparForm()">✖ Limpar</button>
        </div>
    </div>
    <div class="card">
        <div class="card-header">Funcionários Cadastrados</div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Nome</th><th>CPF</th><th>Cargo</th><th>Salário</th><th>Admissão</th><th>Ativo</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-funcionarios">
                    <tr><td colspan="7" class="text-center text-muted">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
