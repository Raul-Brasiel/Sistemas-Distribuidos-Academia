<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Matrículas - Academia</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="JS/script_matriculas.js"></script>
    <script> function montarMenu() { $("#div_Menu").load("nav_bar.html"); } </script>
</head>
<body onload="montarMenu(); inicializar();">
<div id="div_Menu"></div>
<div class="container mt-4">
    <h4>📝 Gerenciar Matrículas</h4><hr>
    <div id="msg"></div>
    <div class="card mb-4">
        <div class="card-header" id="form-titulo">Nova Matrícula</div>
        <div class="card-body">
            <input type="hidden" id="matricula-id">
            <div class="row mb-2">
                <div class="col-md-6">
                    <label class="form-label">Cliente *</label>
                    <select id="cliente-id" class="form-select">
                        <option value="">-- Selecione um cliente --</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Plano *</label>
                    <select id="plano-id" class="form-select">
                        <option value="">-- Selecione um plano --</option>
                    </select>
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-4">
                    <label class="form-label">Data de Início *</label>
                    <input type="date" id="data-inicio" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Data de Fim *</label>
                    <input type="date" id="data-fim" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select id="status" class="form-select">
                        <option value="ativa">Ativa</option>
                        <option value="suspensa">Suspensa</option>
                        <option value="cancelada">Cancelada</option>
                        <option value="expirada">Expirada</option>
                    </select>
                </div>
            </div>
            <div class="mb-2">
                <label class="form-label">Observações</label>
                <input type="text" id="observacoes" class="form-control" placeholder="Observações opcionais">
            </div>
            <button class="btn btn-primary btn-sm" onclick="salvarMatricula()">💾 Salvar</button>
            <button class="btn btn-secondary btn-sm" onclick="limparForm()">✖ Limpar</button>
        </div>
    </div>
    <div class="card">
        <div class="card-header">Matrículas Cadastradas</div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Cliente</th><th>Plano</th><th>Início</th><th>Fim</th><th>Status</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-matriculas">
                    <tr><td colspan="6" class="text-center text-muted">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
