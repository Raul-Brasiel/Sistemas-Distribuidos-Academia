<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Pagamentos - Academia</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="JS/script_pagamentos.js"></script>
    <script> function montarMenu() { $("#div_Menu").load("nav_bar.html"); } </script>
</head>
<body onload="montarMenu(); inicializar();">
<div id="div_Menu"></div>
<div class="container mt-4">
    <h4>💳 Gerenciar Pagamentos</h4><hr>
    <div id="msg"></div>
    <div class="card mb-4">
        <div class="card-header" id="form-titulo">Novo Pagamento</div>
        <div class="card-body">
            <input type="hidden" id="pag-id">
            <div class="row mb-2">
                <div class="col-md-6">
                    <label class="form-label">Matrícula *</label>
                    <select id="matricula-id" class="form-select">
                        <option value="">-- Selecione uma matrícula --</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Valor (R$) *</label>
                    <input type="number" id="valor" class="form-control" step="0.01" placeholder="129.90">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Método</label>
                    <select id="metodo" class="form-select">
                        <option value="pix">Pix</option>
                        <option value="cartao_credito">Cartão de Crédito</option>
                        <option value="cartao_debito">Cartão de Débito</option>
                        <option value="boleto">Boleto</option>
                        <option value="dinheiro">Dinheiro</option>
                    </select>
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-3">
                    <label class="form-label">Vencimento *</label>
                    <input type="date" id="dataVencimento" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data do Pagamento</label>
                    <input type="date" id="dataPagamento" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Status</label>
                    <select id="status" class="form-select">
                        <option value="pendente">Pendente</option>
                        <option value="pago">Pago</option>
                        <option value="atrasado">Atrasado</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="salvarPagamento()">💾 Salvar</button>
            <button class="btn btn-secondary btn-sm" onclick="limparForm()">✖ Limpar</button>
        </div>
    </div>
    <div class="card">
        <div class="card-header">Pagamentos Cadastrados</div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Matrícula</th><th>Valor</th><th>Vencimento</th><th>Pagamento</th><th>Método</th><th>Status</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-pagamentos">
                    <tr><td colspan="7" class="text-center text-muted">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
