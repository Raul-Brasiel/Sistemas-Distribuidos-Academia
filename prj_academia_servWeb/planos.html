<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Planos - Academia</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="JS/script_planos.js"></script>
    <script> function montarMenu() { $("#div_Menu").load("nav_bar.html"); } </script>
</head>
<body onload="montarMenu(); carregarPlanos();">
<div id="div_Menu"></div>
<div class="container mt-4">
    <h4>📋 Gerenciar Planos</h4><hr>
    <div id="msg"></div>
    <div class="card mb-4">
        <div class="card-header" id="form-titulo">Novo Plano</div>
        <div class="card-body">
            <input type="hidden" id="plano-id">
            <div class="row mb-2">
                <div class="col-md-6">
                    <label class="form-label">Nome *</label>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: Plano Mensal">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Preço (R$) *</label>
                    <input type="number" id="preco" class="form-control" step="0.01" placeholder="99.90">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Duração (dias) *</label>
                    <input type="number" id="duracao" class="form-control" placeholder="30">
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-3">
                    <label class="form-label">Ativo</label>
                    <select id="ativo" class="form-select">
                        <option value="true">Sim</option>
                        <option value="false">Não</option>
                    </select>
                </div>
                <div class="col-md-9">
                    <label class="form-label">Descrição</label>
                    <input type="text" id="descricao" class="form-control" placeholder="Descrição do plano">
                </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="salvarPlano()">💾 Salvar</button>
            <button class="btn btn-secondary btn-sm" onclick="limparForm()">✖ Limpar</button>
        </div>
    </div>
    <div class="card">
        <div class="card-header">Planos Cadastrados</div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Nome</th><th>Duração</th><th>Preço</th><th>Ativo</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-planos">
                    <tr><td colspan="5" class="text-center text-muted">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
