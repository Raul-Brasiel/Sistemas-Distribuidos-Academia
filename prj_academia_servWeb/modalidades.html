<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Modalidades - Academia</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="JS/script_modalidades.js"></script>
    <script> function montarMenu() { $("#div_Menu").load("nav_bar.html"); } </script>
</head>
<body onload="montarMenu(); inicializar();">
<div id="div_Menu"></div>
<div class="container mt-4">
    <h4>🏃 Gerenciar Modalidades</h4><hr>
    <div id="msg"></div>
    <div class="card mb-4">
        <div class="card-header" id="form-titulo">Nova Modalidade</div>
        <div class="card-body">
            <input type="hidden" id="modal-id">
            <div class="row mb-2">
                <div class="col-md-5">
                    <label class="form-label">Nome *</label>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: Spinning">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Duração (min) *</label>
                    <input type="number" id="duracaoMinutos" class="form-control" placeholder="50">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Capacidade *</label>
                    <input type="number" id="capacidadeMax" class="form-control" placeholder="20">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Ativa</label>
                    <select id="ativa" class="form-select">
                        <option value="true">Sim</option>
                        <option value="false">Não</option>
                    </select>
                </div>
            </div>
            <div class="row mb-2">
                <div class="col-md-4">
                    <label class="form-label">Nível</label>
                    <select id="nivel" class="form-select">
                        <option value="Todos">Todos</option>
                        <option value="Iniciante">Iniciante</option>
                        <option value="Intermediário">Intermediário</option>
                        <option value="Avançado">Avançado</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Instrutor</label>
                    <select id="instrutorId" class="form-select">
                        <option value="">-- Sem instrutor --</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Descrição</label>
                    <input type="text" id="descricao" class="form-control" placeholder="Descrição da aula">
                </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="salvarModalidade()">💾 Salvar</button>
            <button class="btn btn-secondary btn-sm" onclick="limparForm()">✖ Limpar</button>
        </div>
    </div>
    <div class="card">
        <div class="card-header">Modalidades Cadastradas</div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Nome</th><th>Nível</th><th>Duração</th><th>Capacidade</th><th>Instrutor</th><th>Ativa</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-modalidades">
                    <tr><td colspan="7" class="text-center text-muted">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
