<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Avaliações Físicas - Academia</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="JS/script_avaliacoes.js"></script>
    <script> function montarMenu() { $("#div_Menu").load("nav_bar.html"); } </script>
</head>
<body onload="montarMenu(); inicializar();">
<div id="div_Menu"></div>
<div class="container mt-4">
    <h4>📊 Avaliações Físicas</h4><hr>
    <div id="msg"></div>
    <div class="card mb-4">
        <div class="card-header" id="form-titulo">Nova Avaliação</div>
        <div class="card-body">
            <input type="hidden" id="aval-id">
            <div class="row mb-2">
                <div class="col-md-4">
                    <label class="form-label">Cliente *</label>
                    <select id="clienteId" class="form-select">
                        <option value="">-- Selecione --</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Avaliador (Funcionário)</label>
                    <select id="funcionarioId" class="form-select">
                        <option value="">-- Selecione --</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Data da Avaliação *</label>
                    <input type="date" id="dataAvaliacao" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Próxima Avaliação</label>
                    <input type="date" id="proximaAvaliacao" class="form-control">
                </div>
            </div>

            <hr>
            <p class="fw-bold mb-2">Dados Biométricos</p>
            <div class="row mb-2">
                <div class="col-md-2">
                    <label class="form-label">Peso (kg)</label>
                    <input type="number" id="peso" class="form-control" step="0.1" placeholder="75.5" oninput="calcularImc()">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Altura (cm)</label>
                    <input type="number" id="altura" class="form-control" placeholder="175" oninput="calcularImc()">
                </div>
                <div class="col-md-2">
                    <label class="form-label">IMC</label>
                    <input type="text" id="imc" class="form-control" placeholder="Calculado auto." readonly>
                </div>
                <div class="col-md-2">
                    <label class="form-label">% Gordura</label>
                    <input type="number" id="percentualGordura" class="form-control" step="0.1" placeholder="18.5">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Massa Muscular (kg)</label>
                    <input type="number" id="massaMuscular" class="form-control" step="0.1" placeholder="60.0">
                </div>
            </div>

            <p class="fw-bold mb-2">Pressão Arterial</p>
            <div class="row mb-2">
                <div class="col-md-2">
                    <label class="form-label">Sistólica</label>
                    <input type="number" id="sistolica" class="form-control" placeholder="120">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Diastólica</label>
                    <input type="number" id="diastolica" class="form-control" placeholder="80">
                </div>
            </div>

            <div class="row mb-2">
                <div class="col-md-5">
                    <label class="form-label">Objetivo Declarado</label>
                    <input type="text" id="objetivoDeclarado" class="form-control" placeholder="Ex: Emagrecimento">
                </div>
                <div class="col-md-7">
                    <label class="form-label">Observações</label>
                    <input type="text" id="observacoes" class="form-control" placeholder="Observações do avaliador">
                </div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="salvarAvaliacao()">💾 Salvar</button>
            <button class="btn btn-secondary btn-sm" onclick="limparForm()">✖ Limpar</button>
        </div>
    </div>
    <div class="card">
        <div class="card-header">Avaliações Cadastradas</div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Cliente</th><th>Data</th><th>Peso</th><th>IMC</th><th>% Gordura</th><th>Próxima</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-avaliacoes">
                    <tr><td colspan="7" class="text-center text-muted">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
