<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Treinos - Academia</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="JS/script_treinos.js"></script>
    <script> function montarMenu() { $("#div_Menu").load("nav_bar.html"); } </script>
</head>
<body onload="montarMenu(); inicializar();">
<div id="div_Menu"></div>
<div class="container mt-4">
    <h4>💪 Gerenciar Treinos</h4><hr>
    <div id="msg"></div>
    <div class="card mb-4">
        <div class="card-header" id="form-titulo">Novo Treino</div>
        <div class="card-body">
            <input type="hidden" id="treino-id">
            <div class="row mb-2">
                <div class="col-md-4">
                    <label class="form-label">Cliente *</label>
                    <select id="clienteId" class="form-select">
                        <option value="">-- Selecione --</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Funcionário (Instrutor)</label>
                    <select id="funcionarioId" class="form-select">
                        <option value="">-- Selecione --</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Nome do Treino *</label>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: Treino A — Peito">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Objetivo</label>
                    <input type="text" id="objetivo" class="form-control" placeholder="Ex: Hipertrofia">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Nível</label>
                    <select id="nivel" class="form-select">
                        <option value="Todos">Todos</option>
                        <option value="Iniciante">Iniciante</option>
                        <option value="Intermediário">Intermediário</option>
                        <option value="Avançado">Avançado</option>
                    </select>
                </div>
            </div>

            <hr>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <strong>Exercícios</strong>
                <button class="btn btn-success btn-sm" onclick="adicionarExercicio()">+ Adicionar Exercício</button>
            </div>
            <div id="lista-exercicios"></div>

            <div class="mt-3">
                <button class="btn btn-primary btn-sm" onclick="salvarTreino()">💾 Salvar</button>
                <button class="btn btn-secondary btn-sm" onclick="limparForm()">✖ Limpar</button>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="card-header">Treinos Cadastrados</div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr><th>Nome</th><th>Cliente</th><th>Objetivo</th><th>Nível</th><th>Exercícios</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-treinos">
                    <tr><td colspan="6" class="text-center text-muted">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
