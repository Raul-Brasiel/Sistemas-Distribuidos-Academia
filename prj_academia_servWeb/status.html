<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Status do Sistema - Academia</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="JS/script_status.js"></script>
    <script> function montarMenu() { $("#div_Menu").load("nav_bar.html"); } </script>
</head>
<body onload="montarMenu(); carregarStatus();">
<div id="div_Menu"></div>
<div class="container mt-4">
    <h4>🟢 Status do Sistema</h4>
    <p class="text-muted small">Instâncias ativas do Serviço 1 (load balancer round-robin)</p><hr>
    <div id="msg"></div>
    <div class="row">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">Instâncias do Serviço 1</div>
                <div class="card-body" id="instancias-container">
                    <p class="text-muted">Carregando...</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">Demais Serviços</div>
                <div class="card-body" id="outros-servicos">
                    <p class="text-muted">Verificando...</p>
                </div>
            </div>
        </div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="carregarStatus()">🔄 Atualizar</button>
</div>
</body>
</html>
